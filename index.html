<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Feliz Aniversário!</title>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    font-family:'Segoe UI', sans-serif;
    background:linear-gradient(135deg,#a36dff,#ff9ed6,#ffffff);
    background-size:400% 400%;
    animation:bgMove 10s infinite alternate;
}

@keyframes bgMove{
    0%{background-position:0% 50%;}
    100%{background-position:100% 50%;}
}

/* Container do bolo */
#cake-container{
    position:relative;
}

/* Imagem do bolo */
#cake-img{
    display:block;
    max-width:400px;
    width:90vw;
}

/* Chama */
.flame{
    width:56px;
    height:60px;
    background:radial-gradient(circle, #fff 0%, #ffb300 60%, orange 100%);
    border-radius:50%;
    position:absolute;
    top:49px;
    left:160px;
    box-shadow:0 0 20px orange;
    animation:flicker 0.15s infinite;
}

@keyframes flicker{
    0%{transform:scale(1) rotate(-2deg);}
    50%{transform:scale(1.2) rotate(2deg);}
    100%{transform:scale(0.9) rotate(-1deg);}
}

.hidden{
    display:none;
}

/* Botão bonito */
button{
    margin-top:60px;
    padding:14px 28px;
    font-size:18px;
    border:none;
    border-radius:40px;
    background:linear-gradient(45deg,#ff7bc3,#a36dff);
    color: white;
    font-weight: bold;
    cursor:pointer;
    box-shadow:0 10px 20px rgba(0,0,0,0.2);
    transition:0.3s;
}

button:hover{
    transform:scale(1.08);
    box-shadow:0 15px 30px rgba(0,0,0,0.3);
}

/* Confete */
.confetti{
    position:fixed;
    width:8px;
    height:8px;
    top:-10px;
    animation:fall linear forwards;
}

@keyframes fall{
    to{
        transform:translateY(110vh) rotate(720deg);
    }
}

</style>
</head>

<body>

<h1>🎉 Parabéns, gatinha! Assopre a velinha 🎂</h1>

<div id="cake-container">
    <img src="src/cake_niver.png" id="cake-img" alt="Bolo de Aniversário">
    <div class="flame" id="flame"></div>
</div>

<button onclick="startMic()">Ativar Microfone 🎤</button>

<!-- Áudio de aniversário -->
<audio id="birthday-audio" src="src/Parabens.mp3" loop></audio>

<script>

let analyser;
let dataArray;

async function startMic(){

    // Tocar a música de aniversário
    const audio = document.getElementById("birthday-audio");
    audio.play().catch(e => console.log("Autoplay bloqueado:", e));

    // Acessar microfone
    const stream = await navigator.mediaDevices.getUserMedia({audio:true});
    const audioContext = new AudioContext();
    const source = audioContext.createMediaStreamSource(stream);

    analyser = audioContext.createAnalyser();
    analyser.fftSize = 256;

    source.connect(analyser);

    const bufferLength = analyser.frequencyBinCount;
    dataArray = new Uint8Array(bufferLength);

    detectBlow();
}

function detectBlow(){

    analyser.getByteFrequencyData(dataArray);

    let volume = dataArray.reduce((a,b)=>a+b)/dataArray.length;

    if(volume > 60){
        apagarVela();
        return;
    }

    requestAnimationFrame(detectBlow);
}

function apagarVela(){

    document.getElementById("flame").classList.add("hidden");
    soltarConfete();
}

function soltarConfete(){

    for(let i=0;i<120;i++){

        const confetti = document.createElement("div");

        confetti.classList.add("confetti");

        confetti.style.left = Math.random()*100+"vw";
        confetti.style.background = `hsl(${Math.random()*360},100%,50%)`;
        confetti.style.animationDuration = 3 + Math.random()*3 + "s";

        document.body.appendChild(confetti);

        setTimeout(()=>confetti.remove(),6000);
    }
}

</script>

</body>
</html>
